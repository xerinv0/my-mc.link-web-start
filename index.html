```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Dashboard</title>

<style>
:root{
    --bg:#0b1120;
    --card:#111827;
    --card-2:#1e293b;
    --border:#334155;
    --text:#f8fafc;
    --muted:#94a3b8;

    --green:#22c55e;
    --red:#ef4444;
    --yellow:#f59e0b;
    --blue:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
        radial-gradient(circle at top left,#1e3a8a33,transparent 35%),
        radial-gradient(circle at top right,#7c3aed22,transparent 35%),
        var(--bg);
    color:var(--text);
    font-family:Inter,Segoe UI,sans-serif;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:10px;
}

.title{
    font-size:2rem;
    font-weight:700;
}

.subtitle{
    color:var(--muted);
}

.status-badge{
    padding:10px 18px;
    border-radius:999px;
    font-weight:600;
    border:1px solid var(--border);
}

.status-online{
    background:#22c55e22;
    color:var(--green);
}

.status-offline{
    background:#ef444422;
    color:var(--red);
}

.status-starting{
    background:#f59e0b22;
    color:var(--yellow);
}

.grid{
    display:grid;
    gap:20px;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
}

.card{
    background:rgba(17,24,39,.8);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.card h3{
    margin-bottom:18px;
    font-size:1.05rem;
}

.stat{
    margin-bottom:16px;
}

.stat-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.progress{
    height:10px;
    background:#0f172a;
    border-radius:999px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    transition:.4s ease;
    background:linear-gradient(
        90deg,
        var(--blue),
        #60a5fa
    );
}

.connection{
    display:flex;
    justify-content:space-between;
    padding:12px;
    background:#0f172a;
    border-radius:10px;
    margin-bottom:10px;
}

.player-list{
    list-style:none;
}

.player-list li{
    background:#0f172a;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
}

.map-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:12px 16px;
    background:var(--blue);
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.map-link:hover{
    opacity:.9;
}

button{
    margin-top:25px;
    width:100%;
    border:none;
    padding:16px;
    border-radius:14px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.online-btn{
    background:var(--green);
    color:white;
}

.offline-btn{
    background:var(--blue);
    color:white;
}

.disabled-btn{
    background:#475569;
    color:white;
    cursor:not-allowed;
}

.small{
    color:var(--muted);
}

.server-name{
    font-size:.95rem;
    color:var(--muted);
    margin-top:6px;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <div class="title">🖥️ Minecraft Dashboard</div>
            <div id="serverName" class="server-name">
                Loading server...
            </div>
        </div>

        <div id="statusBadge"
             class="status-badge status-offline">
             OFFLINE
        </div>
    </div>

    <div class="grid">

        <div class="card">
            <h3>📊 Resource Usage</h3>

            <div class="stat">
                <div class="stat-header">
                    <span>CPU</span>
                    <span id="cpuText">0%</span>
                </div>

                <div class="progress">
                    <div id="cpuBar" class="progress-bar"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-header">
                    <span>RAM</span>
                    <span id="ramText">0%</span>
                </div>

                <div class="progress">
                    <div id="ramBar" class="progress-bar"></div>
                </div>
            </div>

            <div id="ramRaw" class="small"></div>
        </div>

        <div class="card">
            <h3>🔗 Connections</h3>

            <div class="connection">
                <span>Java</span>
                <span id="java">Not available</span>
            </div>

            <div class="connection">
                <span>Bedrock</span>
                <span id="geyser">Not available</span>
            </div>
        </div>

        <div class="card">
            <h3>👥 Online Players</h3>

            <ul id="players" class="player-list">
                <li>No players online</li>
            </ul>
        </div>

        <div class="card">
            <h3>🗺️ Live Map</h3>

            <div id="mapContainer">
                Map unavailable
            </div>
        </div>

    </div>

    <button id="startBtn" class="offline-btn">
        Start Server
    </button>

</div>

<script>
const API = "/api";

const el = {
    cpuText: document.getElementById("cpuText"),
    ramText: document.getElementById("ramText"),
    cpuBar: document.getElementById("cpuBar"),
    ramBar: document.getElementById("ramBar"),
    ramRaw: document.getElementById("ramRaw"),

    java: document.getElementById("java"),
    geyser: document.getElementById("geyser"),

    players: document.getElementById("players"),
    mapContainer: document.getElementById("mapContainer"),

    statusBadge: document.getElementById("statusBadge"),
    startBtn: document.getElementById("startBtn"),

    serverName: document.getElementById("serverName")
};

function parsePercent(value){
    return parseFloat(
        String(value).replace("%","")
    ) || 0;
}

async function fetchStatus(){
    try{
        const res = await fetch(`${API}/status`);

        if(!res.ok){
            throw new Error();
        }

        const data = await res.json();

        const stats = data.currentData?.stats;

        const cpu = parsePercent(stats?.cpu);
        const ram = parsePercent(
            stats?.memory?.percent
        );

        el.cpuText.textContent = `${cpu}%`;
        el.ramText.textContent = `${ram}%`;

        el.cpuBar.style.width = `${cpu}%`;
        el.ramBar.style.width = `${ram}%`;

        el.ramRaw.textContent =
            stats?.memory?.raw || "";

        el.serverName.textContent =
            stats?.serverName ||
            "Unknown Server";

        if(data.isRetrying){
            el.statusBadge.textContent =
                "STARTING";
            el.statusBadge.className =
                "status-badge status-starting";
        }
        else if(data.isOnline){
            el.statusBadge.textContent =
                "ONLINE";
            el.statusBadge.className =
                "status-badge status-online";
        }
        else{
            el.statusBadge.textContent =
                "OFFLINE";
            el.statusBadge.className =
                "status-badge status-offline";
        }

        el.java.textContent = data.ips?.javaIp
            ? `${data.ips.javaIp.hostname}:${data.ips.javaIp.port}`
            : "Not available";

        el.geyser.textContent = data.ips?.geyserIp
            ? `${data.ips.geyserIp.hostname}:${data.ips.geyserIp.port}`
            : "Not available";

        el.players.innerHTML = "";

        if(!data.players?.length){
            el.players.innerHTML =
                "<li>No players online</li>";
        } else {
            data.players.forEach(player=>{
                const li =
                    document.createElement("li");
                li.textContent =
                    `👤 ${player}`;
                el.players.appendChild(li);
            });
        }

        el.mapContainer.innerHTML = "";

        if(
            data.mapUrl?.success &&
            data.mapUrl?.message &&
            data.mapUrl.message.startsWith("http")
        ){
            const a =
                document.createElement("a");

            a.href = data.mapUrl.message;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.className = "map-link";
            a.textContent =
                "🌍 Open Live Map";

            el.mapContainer.appendChild(a);
        }
        else{
            el.mapContainer.textContent =
                "Map unavailable";
        }

        if(data.isOnline){
            el.startBtn.textContent =
                "Server Online";

            el.startBtn.className =
                "online-btn";

            el.startBtn.disabled = true;
        }
        else if(data.isRetrying){
            el.startBtn.textContent =
                "Booting...";

            el.startBtn.className =
                "disabled-btn";

            el.startBtn.disabled = true;
        }
        else{
            el.startBtn.textContent =
                "Start Server";

            el.startBtn.className =
                "offline-btn";

            el.startBtn.disabled = false;
        }

    } catch(err){
        el.statusBadge.textContent =
            "API OFFLINE";

        el.statusBadge.className =
            "status-badge status-offline";
    }
}

async function startServer(){
    try{
        el.startBtn.disabled = true;
        el.startBtn.textContent =
            "Starting...";

        await fetch(`${API}/start`, {
            method:"POST"
        });

        fetchStatus();

    }catch{
        alert(
            "Failed to start server."
        );
    }
}

el.startBtn.addEventListener(
    "click",
    startServer
);

fetchStatus();
setInterval(fetchStatus, 5000);
</script>

</body>
</html>
```
